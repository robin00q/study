# ─────────────────────────────────────────────────────────────
# Lab 0 : ES + Kibana 단일 노드 (학습용)
#
# 띄우기:   docker compose up -d
# 상태확인: docker compose ps
# 끄기:     docker compose down          (데이터 유지: 볼륨은 남음)
# 완전삭제: docker compose down -v        (-v = 볼륨까지 삭제)
#
# 확인:
#   curl localhost:9200                  → 버전/신원 정보
#   curl localhost:9200/_cluster/health  → green/yellow/red
#   Kibana → http://localhost:5601 → 좌측 메뉴 Dev Tools (REST 콘솔)
#
# ※ nori(한국어 형태소) 플러그인은 Dockerfile.es 에서 설치해 이미지에 구워둔다.
#    변경 후 반영: docker compose up -d --build
# ─────────────────────────────────────────────────────────────
# 폴더명이 한글(실습)이라 프로젝트명 자동생성이 실패함 → 명시적으로 지정
name: es-lab

services:
  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.es
    image: es-lab-nori:7.17.18   # 빌드 결과 이미지 태그
    container_name: es-lab
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1024m -Xmx1024m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data   # 색인 데이터 보존
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 5s
      retries: 12

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.18
    container_name: kibana-lab
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy   # ES가 health 통과한 뒤에 Kibana 시작

volumes:
  es-data:
