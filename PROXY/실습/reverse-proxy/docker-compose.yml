services:
  web1:
    image: traefik/whoami
    hostname: web1
  web2:
    image: traefik/whoami
    hostname: web2
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"    # HTTP
      - "8443:443"   # HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on: [web1, web2]